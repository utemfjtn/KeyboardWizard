name: 跨平台打包

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact_name: 按键精灵-windows
            ext: exe
          - os: macos-latest
            name: macOS
            artifact_name: 按键精灵-macos
            ext: app
          - os: ubuntu-latest
            name: Linux
            artifact_name: 按键精灵-linux
            ext: bin

    runs-on: ${{ matrix.os }}
    name: 构建 ${{ matrix.name }} 版本

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装系统依赖（Linux）
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-xlib scrot python3-dev libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 打包（PyInstaller）
        run: |
          python -m PyInstaller --clean --noconfirm build.spec

      - name: 代码签名（macOS，ad-hoc + entitlements）
        if: runner.os == 'macOS'
        run: |
          # GitHub Actions 上没有 Apple Developer 证书，使用 ad-hoc 签名（-）
          # 关键：entitlements 中的 com.apple.security.cs.disable-library-validation
          # 允许加载 PyInstaller 打包的未签名 dylib（libjxl/libhwy/libbrotlidec 等）
          # 否则 AMFI 会终止进程，崩溃报告显示 bug_type 309 / trmStatus 1
          APP="dist/按键精灵.app"
          if [ ! -d "$APP" ]; then
            echo "未找到 .app，dist 目录内容："
            ls -la dist/
            exit 1
          fi
          echo "==== 签名前 ===="
          codesign -dv "$APP" 2>&1 || true
          echo "==== 执行 ad-hoc 签名（含 entitlements）===="
          codesign --deep --force --sign - \
            --options runtime \
            --entitlements entitlements.plist \
            "$APP"
          echo "==== 签名后 ===="
          codesign -dv "$APP" 2>&1 || true
          echo "==== 验证签名 ===="
          codesign --verify --verbose=4 "$APP" 2>&1 || true
          echo "==== entitlements 检查 ===="
          codesign -d --entitlements - "$APP" 2>&1 || true

      - name: 整理产物（Windows）
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist -Filter *.exe | Select-Object -First 1
          if ($exe) {
            Write-Host "产物：$($exe.FullName)"
          }

      - name: 整理产物（macOS）
        if: runner.os == 'macOS'
        run: |
          ls -la dist/

      - name: 整理产物（Linux）
        if: runner.os == 'Linux'
        run: |
          ls -la dist/

      - name: 上传产物（手动触发时）
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.exe
            dist/*.app
            dist/按键精灵
          if-no-files-found: error

      - name: 发布 Release（打 tag 时自动）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.app
            dist/按键精灵
          name: 按键精灵 ${{ github.ref_name }}
          body: |
            ## 使用方法

            ### Windows
            1. 下载 `按键精灵.exe`（约 40-60 MB）
            2. 双击即可运行，无需安装 Python
            3. 如按键/截图无反应，右键 → 以管理员身份运行

            ### macOS
            1. 下载 `按键精灵.app`（约 50-70 MB）
            2. 拖入应用程序文件夹即可运行
            3. 首次运行需在「系统设置 → 隐私与安全性」中允许打开
            4. 需在「辅助功能」和「屏幕录制」中授予权限

            ### Linux
            1. 下载 `按键精灵`（约 40-60 MB）
            2. 添加执行权限：`chmod +x 按键精灵`
            3. 运行：`./按键精灵`
            4. 建议使用 X11 会话（Wayland 下截图可能受限制）
