name: 打包 Windows exe

# 触发方式：手动运行 / 推送 tag 自动构建并发 Release
on:
  workflow_dispatch:        # 在 GitHub 网页手动点击运行
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest   # GitHub 免费提供的 Windows Server
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 打包（PyInstaller onefile）
        run: |
          python -m PyInstaller --clean --noconfirm build.spec

      - name: 重命名为中文名
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist -Filter *.exe | Select-Object -First 1
          if ($exe) {
            Rename-Item $exe.FullName "按键精灵.exe"
            Write-Host "产物：dist\按键精灵.exe"
          }

      - name: 上传 exe 产物（手动触发时）
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: 按键精灵-exe
          path: dist/*.exe
          if-no-files-found: error

      - name: 发布 Release（打 tag 时自动）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          name: 按键精灵 ${{ github.ref_name }}
          body: |
            ## 使用方法

            1. 下载下方的 `按键精灵.exe`（约 40-60 MB）
            2. 双击即可运行，无需安装 Python
            3. 如按键/截图无反应，右键 → 以管理员身份运行
