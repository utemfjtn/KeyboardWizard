name: 跨平台打包

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact_name: KeyboardWizard-Windows
            ext: exe
          - os: macos-latest
            name: macOS
            artifact_name: KeyboardWizard-macOS
            ext: app
          - os: ubuntu-latest
            name: Linux
            artifact_name: KeyboardWizard-Linux
            ext: bin

    runs-on: ${{ matrix.os }}
    name: 构建 ${{ matrix.name }} 版本

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装系统依赖（Linux）
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-xlib scrot python3-dev libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 打包（PyInstaller）
        run: |
          python -m PyInstaller --clean --noconfirm build.spec

      - name: 整理产物（Windows）
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist -Filter *.exe | Select-Object -First 1
          if ($exe) {
            $newName = "KeyboardWizard-Windows.exe"
            Rename-Item -Path $exe.FullName -NewName $newName
            Write-Host "产物已重命名：$newName"
            Write-Host "大小：$([math]::Round($(Get-Item "dist\$newName").Length / 1MB, 1)) MB"
          }

      - name: 整理产物（macOS）
        if: runner.os == 'macOS'
        run: |
          ls -la dist/
          if [ -d "dist/KeyboardWizard.app" ]; then
            # 打包成 zip，包含 .app 目录
            cd dist
            zip -r "KeyboardWizard-macOS.zip" "KeyboardWizard.app"
            cd ..
            echo "macOS 应用已打包为 zip"
            ls -lh dist/KeyboardWizard-macOS.zip
          else
            echo "错误：未找到 KeyboardWizard.app"
            ls -la dist/
            exit 1
          fi

      - name: 整理产物（Linux）
        if: runner.os == 'Linux'
        run: |
          ls -la dist/
          if [ -f "dist/KeyboardWizard" ]; then
            mv "dist/KeyboardWizard" "dist/KeyboardWizard-Linux"
            chmod +x "dist/KeyboardWizard-Linux"
            echo "Linux 二进制已重命名：KeyboardWizard-Linux"
            ls -lh dist/KeyboardWizard-Linux
          else
            echo "错误：未找到 KeyboardWizard 二进制文件"
            ls -la dist/
            exit 1
          fi

      - name: 上传产物（手动触发时）
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/KeyboardWizard-Windows.exe
            dist/KeyboardWizard-macOS.zip
            dist/KeyboardWizard-Linux
          if-no-files-found: error

      - name: 发布 Release（打 tag 时自动）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/KeyboardWizard-Windows.exe
            dist/KeyboardWizard-macOS.zip
            dist/KeyboardWizard-Linux
          name: KeyboardWizard ${{ github.ref_name }}
          body: |
            ## 使用方法

            ### Windows
            1. 下载 `KeyboardWizard-Windows.exe`（约 50-80 MB）
            2. 双击即可运行，无需安装 Python
            3. 如按键/截图无反应，右键 → 以管理员身份运行

            ### macOS
            1. 下载 `KeyboardWizard-macOS.zip`（约 60-90 MB）
            2. 解压后将 `KeyboardWizard.app` 拖入「应用程序」文件夹
            3. 首次运行：在应用程序中找到 KeyboardWizard，右键 → 打开（绕过公证限制）
            4. 需在「系统设置 → 隐私与安全性」中授予权限：
               - 辅助功能（全局快捷键）
               - 屏幕录制（截图和图片识别）
               - 自动化（窗口操作）

            ### Linux
            1. 下载 `KeyboardWizard-Linux`（约 50-80 MB）
            2. 添加执行权限：`chmod +x KeyboardWizard-Linux`
            3. 运行：`./KeyboardWizard-Linux`
            4. 建议使用 X11 会话（Wayland 下截图和全局快捷键可能受限制）

            ## 本次更新
            - 修复 Release 产物平台区分
            - macOS 产物改为 zip 打包，包含 .app 目录
            - 各平台文件名添加明确后缀
